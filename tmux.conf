# ESC delay after prefix (ms)
set -s escape-time 0

# increase history size
set -g history-limit 10000

#window navigation
bind -n C-t new-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n C-w kill-window # close current window/tab



# reload tmux configuration
bind r source-file ~/.tmux.conf \; display-message "Config reloaded.."

# set mouse mode
set -g mouse on

# start window numbering from 1
set-window-option -g pane-base-index 1
set -g base-index 1
set-option -g renumber-windows on

# copy/paste
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
bind v paste-buffer

# keep current path
bind c new-window -c "#{pane_current_path}"

# toggle window
bind Space last-window

# list plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-yank'

# split windows horizontally or vertically
bind '\' split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"


# colours?
set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"


setw -g window-status-current-style 'fg=colour0 bg=colour1 bold' # selected window
set -g status-style 'fg=#bdcbde bg=#003300' # entire bar
set-option -g status-right-style 'fg=#ffd700 bg=#360000 bold' # right side of bar
#setw -g clock-mode-colour colour1
# formatting

#setw -g mode-style 'fg=colour1 bg=colour18 bold'
# statusbar
set -g status-position bottom
set -g status-justify left
set -g window-status-format "#[fg=#bdcbde,bg=#333333] #I:#W #F "
setw -g window-status-current-format ' #I #W #F '


set -g window-status-current-format "#[fg=black,bg=#ffd700] #I:#W #F "
#setw -g window-status-format ' #I #[fg=colour7]#W #[fg=colour1]#F '

setw -g window-status-style fg=red,bg=colour235 # 'fg=colour1, bold dim'

set -g status-left ''
set-option -g status-right " %Y-%m-%d %H:%M:%S "
set-option -g status-interval 5

set -g status-right-length 50
set -g status-left-length 10

set -g pane-border-style fg=colour240,bg=black
set -g pane-active-border-style fg=green,bg=black





setw -g window-status-bell-style 'fg=colour2 bg=colour1 bold'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


